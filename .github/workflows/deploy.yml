# Rast Creative Studio — Build & publish to the `deploy` branch.
#
# Why not FTP? GitHub Actions runners cannot reliably reach Hostinger's FTP
# (port 21 control socket times out — Hostinger throttles/blocks CI IPs).
# Instead we BUILD here and push the built site to a `deploy` branch; then
# Hostinger PULLS that branch into public_html via its native "Deploy from
# GitHub" feature. Hostinger -> GitHub always works, so there is nothing to
# time out, and no FTP/SSH secrets are needed.
#
# One-time setup on Hostinger (hPanel):
#   Web Sitesi -> Gelişmiş -> GIT (Deploy from GitHub)
#     Repository : bewoai/rastcreativesite
#     Branch     : deploy        <-- NOT main
#     Path       : public_html
#   (Enable auto-deploy / webhook so each push redeploys.)

name: Deploy (build -> deploy branch)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # actions-gh-pages pushes to the deploy branch

jobs:
  build-and-publish:
    name: Build & publish
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Verify build output
        run: |
          ls -la dist
          test -f dist/index.html

      - name: Publish built site to `deploy` branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy
          force_orphan: true # keep the deploy branch a clean snapshot of dist/
          commit_message: "deploy: built site from ${{ github.sha }}"
