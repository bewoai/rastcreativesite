name: Deploy to Hostinger FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Verify build output
        run: |
          ls -la dist
          test -f dist/index.html

      - name: Verify FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          test -n "$FTP_SERVER" || (echo "FTP_SERVER is empty" && exit 1)
          test -n "$FTP_USERNAME" || (echo "FTP_USERNAME is empty" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "FTP_PASSWORD is empty" && exit 1)

      - name: Deploy dist to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./dist/
          server-dir: ./public_html/
          dangerous-clean-slate: false
          timeout: 300000
