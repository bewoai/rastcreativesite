# Pages CMS configuration for Rast Creative Studio
# https://pagescms.org — GitHub-based CMS, free, no OAuth setup required.
# Open pagescms.org → sign in with GitHub → select this repo → start editing.

media:
  input: public/placeholders
  output: /placeholders

content:
  # ── Portfolio Projects ──────────────────────────────────────────────────
  - name: projects
    label: Projeler
    path: src/content/projects
    type: collection
    filename: "{fields.title|slugify}.md"
    view:
      fields: [title, category, client, year, featured, order]
      primary: title
      sort: order
    fields:
      - name: title
        label: Proje Başlığı
        type: string
        required: true

      - name: category
        label: Kategori
        type: select
        required: true
        options:
          values:
            - Reklam
            - Marka Hikayesi
            - Ürün
            - Kurumsal
            - Medikal

      - name: poster
        label: Poster Görseli
        type: image
        required: true

      - name: posterAlt
        label: Poster Alt Metni
        type: string

      - name: summary
        label: Kısa Açıklama
        type: string

      - name: client
        label: Müşteri
        type: string

      - name: year
        label: Yıl
        type: number

      - name: duration
        label: Süre (ör. 01:24)
        type: string

      - name: vimeoId
        label: Vimeo Video ID
        type: string
        description: "Vimeo video URL'sindeki sayısal ID (ör. 123456789)"

      - name: featured
        label: Ana Sayfada Göster
        type: boolean
        default: false

      - name: order
        label: Sıralama
        type: number
        default: 0

      - name: draft
        label: Taslak
        type: boolean
        default: false

      - name: body
        label: Proje Detayı
        type: rich-text

  # ── Services ────────────────────────────────────────────────────────────
  - name: services
    label: Hizmetler
    path: src/content/services
    type: collection
    filename: "{fields.title|slugify}.md"
    view:
      fields: [title, summary, order]
      primary: title
      sort: order
    fields:
      - name: title
        label: Hizmet Adı
        type: string
        required: true

      - name: summary
        label: Kısa Açıklama
        type: string
        required: true

      - name: features
        label: Özellikler
        type: string
        list: true

      - name: order
        label: Sıralama
        type: number
        default: 0

      - name: body
        label: Detaylı Açıklama
        type: rich-text

  # ── FAQ ─────────────────────────────────────────────────────────────────
  - name: faq
    label: Sıkça Sorulan Sorular
    path: src/content/faq
    type: collection
    filename: "{fields.order|pad:2}-{fields.question|slugify}.md"
    view:
      fields: [question, order]
      primary: question
      sort: order
    fields:
      - name: question
        label: Soru
        type: string
        required: true

      - name: order
        label: Sıralama
        type: number
        default: 0

      - name: body
        label: Cevap
        type: rich-text
