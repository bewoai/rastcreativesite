backend:
  name: github
  repo: bewoai/rastcreativesite
  branch: main

local_backend: true
publish_mode: editorial_workflow

site_url: https://rastcreative.com
display_url: https://rastcreative.com
logo_url: /logo-black.svg

media_folder: public/uploads/general
public_folder: /uploads/general

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: projects
    label: Projeler
    label_singular: Proje
    folder: src/content/projects
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    summary: "{{title}} - {{client}} - {{category}}"
    media_folder: ../../../public/uploads/projects
    public_folder: /uploads/projects
    editor:
      preview: false
    fields:
      - { label: Başlık, name: title, widget: string }
      - label: Kategori
        name: category
        widget: select
        options:
          - Reklam
          - Marka Hikayesi
          - Ürün
          - Kurumsal
          - Medikal
          - Sosyal Medya
      - { label: Müşteri / Marka, name: client, widget: string, required: false }
      - { label: Yıl, name: year, widget: number, value_type: int, required: false }
      - label: Yayın tarihi
        name: publishDate
        widget: date
        format: YYYY-MM-DD
        date_format: DD.MM.YYYY
        required: false
        hint: VideoObject uploadDate bu tarihten üretilir. Video sayfalarında boş bırakmayın.
      - { label: Özet, name: summary, widget: text, required: false }
      - label: Kapak görseli
        name: poster
        widget: image
        required: true
        hint: Yatay kartlar için 16:9, dikey Reels için YouTube kapak URL'si veya yüklenen görsel kullanılabilir.
      - { label: Kapak alt metni, name: posterAlt, widget: string, required: false }
      - { label: YouTube ID, name: youtubeId, widget: string, required: false }
      - { label: Vimeo ID, name: vimeoId, widget: string, required: false }
      - { label: Dış bağlantı, name: externalUrl, widget: string, required: false }
      - { label: Dikey video, name: vertical, widget: boolean, default: false, required: false }
      - { label: Kısa önizleme videosu, name: preview, widget: string, required: false, hint: Örnek: /videos/proje-preview.mp4 }
      - { label: Süre etiketi, name: duration, widget: string, required: false, hint: Örnek: 01:24 }
      - { label: Ana sayfada öne çıkar, name: featured, widget: boolean, default: false, required: false }
      - { label: Sıra, name: order, widget: number, value_type: int, default: 0 }
      - { label: Taslak, name: draft, widget: boolean, default: false, required: false }
      - { label: İçerik, name: body, widget: markdown, required: false }

  - name: blog
    label: Blog
    label_singular: Blog Yazısı
    folder: src/content/blog
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    summary: "{{title}} - {{pubDate}}"
    media_folder: ../../assets/uploads/blog
    public_folder: ../../assets/uploads/blog
    editor:
      preview: false
    fields:
      - { label: Başlık, name: title, widget: string }
      - { label: Meta açıklama, name: description, widget: text }
      - { label: Yazar, name: author, widget: string, default: "Berat Değirmenci" }
      - label: Yayın tarihi
        name: pubDate
        widget: date
        format: YYYY-MM-DD
        date_format: DD.MM.YYYY
      - label: Güncelleme tarihi
        name: updatedDate
        widget: date
        format: YYYY-MM-DD
        date_format: DD.MM.YYYY
        required: false
      - { label: Kapak görseli, name: cover, widget: image, required: false }
      - { label: Kapak alt metni, name: coverAlt, widget: string, required: false }
      - { label: Etiketler, name: tags, widget: list, required: false }
      - { label: Taslak, name: draft, widget: boolean, default: false, required: false }
      - { label: İçerik, name: body, widget: markdown }

  - name: services
    label: Hizmetler
    label_singular: Hizmet
    folder: src/content/services
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    summary: "{{title}}"
    editor:
      preview: false
    fields:
      - { label: Başlık, name: title, widget: string }
      - { label: Kısa özet, name: summary, widget: text }
      - { label: Özellikler, name: features, widget: list, required: false }
      - { label: Sıra, name: order, widget: number, value_type: int, default: 0 }
      - { label: İçerik, name: body, widget: markdown, required: false }

  - name: faq
    label: SSS
    label_singular: Soru
    folder: src/content/faq
    create: true
    extension: md
    format: frontmatter
    identifier_field: question
    summary: "{{order}} - {{question}}"
    editor:
      preview: false
    fields:
      - { label: Soru, name: question, widget: string }
      - { label: Sıra, name: order, widget: number, value_type: int, default: 0 }
      - { label: Cevap, name: body, widget: markdown }
