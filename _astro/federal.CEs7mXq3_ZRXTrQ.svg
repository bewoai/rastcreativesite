<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!-- Diamond/F mark -->
  <g transform="translate(12, 10)">
    <!-- Diamond shape -->
    <polygon points="50,0 100,50 50,100 0,50" fill="#D40000"/>
    <!-- F letter cutout -->
    <rect x="28" y="28" width="44" height="10" fill="white"/>
    <rect x="28" y="28" width="10" height="44" fill="white"/>
    <rect x="28" y="47" width="32" height="10" fill="white"/>
  </g>
  <!-- FEDERAL text -->
  <text
    x="130"
    y="88"
    font-family="Arial Black, Impact, sans-serif"
    font-weight="900"
    font-size="72"
    fill="#D40000"
    letter-spacing="-1"
  >FEDERAL</text>
  <!-- Registered mark -->
  <text x="462" y="42" font-family="Arial" font-size="22" fill="#D40000">®</text>
</svg>
